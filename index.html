<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Drago</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Lexend:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Lexend', sans-serif;
            background-color: #120f0e; /* The dark chocolate/black from the screenshot */
            color: #d6ccc2;
        }
        .profile-ring {
            border: 4px solid #1a1716;
        }
        .status-dot {
            background-color: #23a55a; /* Discord Online Green */
        }
    </style>
</head>
<body class="flex flex-col items-center justify-center min-h-screen p-6">

    <div class="relative mb-6">
        <img src="avatar.jpeg" alt="avatar.jpeg" class="w-32 h-32 rounded-full profile-ring object-cover">
        <div class="absolute bottom-1 right-2 w-8 h-8 rounded-full status-dot border-4 border-[#120f0e]"></div>
    </div>

    <div class="text-center max-w-md">
        <h1 class="text-4xl font-semibold mb-6">hello, i'm <span class="text-[#a89984]">Drago.</span></h1>
        
        <ul class="text-left space-y-4 mb-10 opacity-90">
            <li class="flex items-start">
                <span class="mr-2">•</span>
                <span>i'm a <b>16 year old</b> learning developer who mostly likes to code and watch Anime</span>
            </li>
            <li class="flex items-start">
                <span class="mr-2">•</span>
                <span>currently, i'm focusing on learning <b>HTML&CSS</b> and learning new frameworks.</span>
            </li>
        </ul>

        <p class="text-sm italic opacity-50 mb-16">i'm not listening to anything right now, but it would show up here if i was!</p>
        
        <h3 class="text-xs uppercase tracking-[0.2em] opacity-40 mb-6">where you can find me</h3>

        <div class="flex flex-row flex-wrap justify-center gap-6 w-full px-4">
            <div class="w-12 h-12 bg-[#2a2423] rounded-full flex items-center justify-center hover:bg-[#3d3533] transition-colors cursor-pointer">
                <img src="https://cdn.simpleicons.org/github/d6ccc2" class="w-6 h-6" alt="GitHub">
            </div>
            <div class="w-12 h-12 bg-[#2a2423] rounded-full flex items-center justify-center hover:bg-[#3d3533] transition-colors cursor-pointer">
                <img src="https://cdn.simpleicons.org/discord/d6ccc2" class="w-6 h-6" alt="Discord">
            </li>
            <div class="w-12 h-12 bg-[#2a2423] rounded-full flex items-center justify-center hover:bg-[#3d3533] transition-colors cursor-pointer">
                <img src="https://cdn.simpleicons.org/roblox/d6ccc2" class="w-6 h-6" alt="Roblox">
            </div>
            <div class="w-12 h-12 bg-[#2a2423] rounded-full flex items-center justify-center hover:bg-[#3d3533] transition-colors cursor-pointer">
                <img src="https://cdn.simpleicons.org/steam/d6ccc2" class="w-6 h-6" alt="Steam">
            </div>
        </div>
    </div>

</body>
</html>
